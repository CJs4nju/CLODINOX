<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLODINOX - Desktop</title>
    <style>
        :root {
            --primary-bg: #050505;
            --card-bg: #121212;
            --accent-red: #d63031;
            --accent-silver: #b2bec3;
            --text-main: #f5f6fa;
            --text-dim: #7f8c8d;
            --input-bg: #1e1e1e;
            --input-border: #333;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .main-wrapper {
            display: flex;
            gap: 30px;
            max-width: 1000px;
            width: 100%;
            position: relative;
        }
        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            flex: 2;
            border: 1px solid #222;
            position: relative;
            overflow: hidden;
        }
        .sidebar {
            flex: 1;
            background: rgba(18, 18, 18, 0.6);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            max-height: 650px;
        }
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            width: 120%;
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
        }
        .content-z { position: relative; z-index: 1; }
        .logo-header { text-align: left; margin-bottom: 30px; }
        .logo-header img { max-width: 200px; height: auto; }
        .tabs {
            display: flex;
            background: #000;
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid #333;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            color: var(--text-dim);
            transition: 0.3s;
        }
        .tab.active { background: var(--accent-red); color: white; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-group { margin-bottom: 20px; }
        .full-width { grid-column: span 2; }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--accent-silver);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            padding: 15px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent-red); box-shadow: 0 0 10px rgba(214, 48, 49, 0.2); }
        .result-display {
            margin-top: 20px;
            background: linear-gradient(135deg, #1a1a1a, #000);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--accent-red);
            text-align: center;
        }
        .result-val { font-size: 3rem; font-weight: 800; color: white; display: block; margin-top: 10px; }
        .folga-res { color: #ff7675; font-size: 0.9rem; margin-top: 10px; font-weight: bold; }
        .history-title { font-size: 0.9rem; font-weight: bold; color: var(--accent-red); margin-bottom: 15px; text-transform: uppercase; }
        .history-list { overflow-y: auto; flex-grow: 1; }
        .history-item { padding: 10px; border-bottom: 1px solid #222; font-size: 0.85rem; color: var(--text-dim); }
        .hidden { display: none; }
        .btn-save {
            margin-top: 15px;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--accent-silver);
            color: var(--accent-silver);
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 0.8rem;
        }
        .btn-save:hover { background: var(--accent-silver); color: black; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="container">
        <div id="watermark-bg"></div>
        <div class="content-z">
            <div class="logo-header" id="logo-place"></div>
            <div class="tabs">
                <div id="t-dir" class="tab active" onclick="setMode('direto')">ESPAÇAMENTO</div>
                <div id="t-inv" class="tab" onclick="setMode('inverso')">QUANTIDADE</div>
            </div>
            <div class="grid-inputs">
                <div class="input-group full-width">
                    <label>Medida Total do Vão (mm)</label>
                    <input type="number" id="total" oninput="calc()">
                </div>
                <div class="input-group">
                    <label>Soma das Laterais (mm)</label>
                    <input type="number" id="lat" oninput="calc()">
                </div>
                <div class="input-group">
                    <label>Face Metalon Central (mm)</label>
                    <input type="number" id="face" oninput="calc()">
                </div>
                <div id="f-dir" class="input-group full-width">
                    <label>Quantidade de Metalons</label>
                    <input type="number" id="qtd" oninput="calc()">
                </div>
                <div id="f-inv" class="input-group full-width hidden">
                    <label>Espaçamento Desejado (mm)</label>
                    <input type="number" id="esp" oninput="calc()">
                </div>
            </div>
            <div class="result-display">
                <span id="res-label" style="color: var(--accent-silver); font-size: 0.9rem;">ESPAÇAMENTO ENTRE BARRAS:</span>
                <span id="res-val" class="result-val">---</span>
                <div id="res-folga" class="folga-res hidden"></div>
            </div>
            <button class="btn-save" onclick="saveToHistory()">SALVAR NO HISTÓRICO</button>
        </div>
    </div>
    <div class="sidebar">
        <div class="history-title">Histórico Recente</div>
        <div id="history" class="history-list">
            <div style="text-align:center; padding-top:20px; color:#444;">Nenhum cálculo salvo</div>
        </div>
        <div style="margin-top:auto; font-size:0.7rem; color:#444; text-align:center;">CLODINOX DESKTOP v1.1</div>
    </div>
</div>

    let mode = 'direto';

    function setMode(m) {
        mode = m;
        document.getElementById('t-dir').className = m === 'direto' ? 'tab active' : 'tab';
        document.getElementById('t-inv').className = m === 'inverso' ? 'tab active' : 'tab';
        document.getElementById('f-dir').className = m === 'direto' ? 'input-group full-width' : 'input-group full-width hidden';
        document.getElementById('f-inv').className = m === 'inverso' ? 'input-group full-width' : 'input-group full-width hidden';
        document.getElementById('res-label').innerText = m === 'direto' ? 'ESPAÇAMENTO ENTRE BARRAS:' : 'QUANTIDADE DE METALONS:';
        document.getElementById('res-folga').className = 'folga-res hidden';
        calc();
    }

    function calc() {
        const t = parseFloat(document.getElementById('total').value) || 0;
        const l = parseFloat(document.getElementById('lat').value) || 0;
        const f = parseFloat(document.getElementById('face').value) || 0;
        const folgaEl = document.getElementById('res-folga');
        folgaEl.className = 'folga-res hidden';
        let res = "---";

        if (t > 0) {
            if (mode === 'direto') {
                const q = parseFloat(document.getElementById('qtd').value) || 0;
                const val = (t - l - (f * q)) / (q + 1);
                res = val > 0 ? val.toFixed(2) + " mm" : "Erro";
            } else {
                const e = parseFloat(document.getElementById('esp').value) || 0;
                if (e > 0) {
                    const qExata = (t - l - e) / (e + f);
                    const qArr = Math.round(qExata);
                    res = qArr + " un";
                    const totalOcupado = l + (f * qArr) + (e * (qArr + 1));
                    const folga = t - totalOcupado;
                    folgaEl.innerText = `Folga Total: ${folga.toFixed(2)} mm`;
                    folgaEl.className = 'folga-res';
                }
            }
        }
        document.getElementById('res-val').innerText = res;
    }

    function saveToHistory() {
        const val = document.getElementById('res-val').innerText;
        if (val === "---" || val === "Erro") return;
        const hist = document.getElementById('history');
        if (hist.innerHTML.includes("Nenhum cálculo")) hist.innerHTML = "";
        const item = document.createElement('div');
        item.className = 'history-item';
        const now = new Date().toLocaleTimeString();
        item.innerHTML = `<strong>${val}</strong> <br> <small>${now} - Total: ${document.getElementById('total').value}mm</small>`;
        hist.prepend(item);
    }

    document.getElementById('logo-place').innerHTML = `<img src="data:image/jpeg;base64,${logoBase64}">`;
    document.getElementById('watermark-bg').innerHTML = `<img src="data:image/jpeg;base64,${logoBase64}" class="watermark">`;
</script>
