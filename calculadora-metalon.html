<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Metalon - CLODINOX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #1e293b;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            padding: 30px;
            max-width: 500px;
            width: 100%;
            border: 1px solid #334155;
        }

        h1 {
            text-align: center;
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: #0f172a;
            padding: 5px;
            border-radius: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tab-btn.active {
            background: #dc2626;
            color: white;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #cbd5e1;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #475569;
            border-radius: 8px;
            background: #0f172a;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
            background: #1e293b;
        }

        input::placeholder {
            color: #64748b;
        }

        .result-box {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            border-radius: 12px;
            padding: 20px;
            margin-top: 25px;
            border: 1px solid #991b1b;
            box-shadow: 0 10px 25px rgba(220, 38, 38, 0.2);
        }

        .result-label {
            color: #fecaca;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .result-value {
            color: white;
            font-size: 32px;
            font-weight: 800;
            display: block;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .info-box {
            background: #0f172a;
            border-radius: 10px;
            padding: 14px;
            margin-top: 12px;
            border: 1px solid #334155;
        }

        .info-label {
            color: #94a3b8;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .info-value {
            color: #e2e8f0;
            font-size: 18px;
            font-weight: 700;
        }

        .info-hint {
            color: #64748b;
            font-size: 11px;
            margin-top: 6px;
        }

        .hidden {
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #334155;
            color: #64748b;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Calculadora de Metalon</h1>
        <p class="subtitle">Cálculo de espaçamento para grades</p>

        <!-- Abas -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('direto')">Espaçamento</button>
            <button class="tab-btn" onclick="switchTab('inverso')">Quantidade</button>
        </div>

        <!-- Campos Comuns -->
        <div class="form-group">
            <label>Medida Total do Vão (mm)</label>
            <input type="number" id="medidaTotal" placeholder="0" oninput="calcular()" inputmode="decimal">
        </div>

        <div class="form-group">
            <label>Soma das Faces Laterais (mm)</label>
            <input type="number" id="faceLaterais" placeholder="0" oninput="calcular()" inputmode="decimal">
        </div>

        <div class="form-group">
            <label>Face dos Metalons Centrais (mm)</label>
            <input type="number" id="faceCentrais" placeholder="0" oninput="calcular()" inputmode="decimal">
        </div>

        <!-- Modo Direto -->
        <div id="modo-direto">
            <div class="form-group">
                <label>Qtd. de Metalons Centrais</label>
                <input type="number" id="qtdMetalons" placeholder="0" oninput="calcular()" inputmode="decimal">
            </div>

            <div class="result-box">
                <div class="result-label">Espaço entre barras</div>
                <span class="result-value" id="resEspacamento">---</span>
            </div>
        </div>

        <!-- Modo Inverso -->
        <div id="modo-inverso" class="hidden">
            <div class="form-group">
                <label>Espaçamento Desejado (mm)</label>
                <input type="number" id="espacamentoDesejado" placeholder="0" oninput="calcular()" inputmode="decimal">
            </div>

            <div class="result-box">
                <div class="result-label">Qtd. de Metalons</div>
                <span class="result-value" id="resQtd">---</span>
            </div>

            <div class="info-box" id="folga-box" style="display: none;">
                <div class="info-label">Folga Real</div>
                <div class="info-value" id="resFolga">---</div>
                <div class="info-hint" id="folga-hint"></div>
            </div>
        </div>

        <div class="footer">
            CLODINOX - Soluções em Metais
        </div>
    </div>

    <script>
        let modoAtual = 'direto';

        function switchTab(modo) {
            modoAtual = modo;
            
            // Atualizar abas
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Mostrar/ocultar modos
            document.getElementById('modo-direto').classList.toggle('hidden', modo !== 'direto');
            document.getElementById('modo-inverso').classList.toggle('hidden', modo !== 'inverso');
            
            calcular();
        }

        function calcular() {
            const total = parseFloat(document.getElementById('medidaTotal').value) || 0;
            const laterais = parseFloat(document.getElementById('faceLaterais').value) || 0;
            const faceC = parseFloat(document.getElementById('faceCentrais').value) || 0;

            if (modoAtual === 'direto') {
                calcularDireto(total, laterais, faceC);
            } else {
                calcularInverso(total, laterais, faceC);
            }
        }

        function calcularDireto(total, laterais, faceC) {
            const qtd = parseFloat(document.getElementById('qtdMetalons').value) || 0;
            
            if (total > 0 && qtd > 0) {
                const divisor = qtd + 1;
                const resultado = (total - laterais - (faceC * qtd)) / divisor;
                
                if (resultado > 0) {
                    document.getElementById('resEspacamento').textContent = resultado.toFixed(2) + ' mm';
                } else {
                    document.getElementById('resEspacamento').textContent = 'Erro';
                }
            } else {
                document.getElementById('resEspacamento').textContent = '---';
            }
        }

        function calcularInverso(total, laterais, faceC) {
            const espDesejado = parseFloat(document.getElementById('espacamentoDesejado').value) || 0;
            
            if (total > 0 && espDesejado > 0 && faceC > 0) {
                const qtd = (total - laterais - espDesejado) / (espDesejado + faceC);
                const qtdArredondada = Math.round(qtd);
                
                if (qtd >= 0) {
                    document.getElementById('resQtd').textContent = qtdArredondada + ' un';
                    
                    // Calcular folga real
                    const espacamentoReal = (total - laterais - (faceC * qtdArredondada)) / (qtdArredondada + 1);
                    const folgaReal = espacamentoReal - espDesejado;
                    
                    document.getElementById('resFolga').textContent = Math.abs(folgaReal).toFixed(2) + ' mm';
                    
                    const folgaBox = document.getElementById('folga-box');
                    const folgaHint = document.getElementById('folga-hint');
                    
                    folgaBox.style.display = 'block';
                    
                    if (Math.abs(folgaReal) < 0.01) {
                        folgaHint.textContent = '✓ Espaçamento exato';
                        folgaHint.style.color = '#86efac';
                    } else if (folgaReal > 0) {
                        folgaHint.textContent = '↑ Espaçamento maior que o desejado';
                        folgaHint.style.color = '#fbbf24';
                    } else {
                        folgaHint.textContent = '↓ Espaçamento menor que o desejado';
                        folgaHint.style.color = '#f87171';
                    }
                } else {
                    document.getElementById('resQtd').textContent = 'Inválido';
                    document.getElementById('folga-box').style.display = 'none';
                }
            } else {
                document.getElementById('resQtd').textContent = '---';
                document.getElementById('folga-box').style.display = 'none';
            }
        }
    </script>
</body>
</html>
